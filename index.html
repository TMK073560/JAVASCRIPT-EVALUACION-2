<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aysén Vivo - Turismo Sostenible en la Patagonia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <h1>🏔️ Aysén Vivo</h1>
            <p>Plataforma de Experiencias Turísticas Sostenibles de Bajo Impacto</p>
        </div>
        <nav class="nav-filters">
            <button class="btn-filter active" data-category="Todos">Todos</button>
            <button class="btn-filter" data-category="Navegación">Navegación</button>
            <button class="btn-filter" data-category="Trekking">Trekking</button>
            <button class="btn-filter" data-category="Pesca">Pesca</button>
            <button class="btn-filter" data-category="Aventura">Aventura</button>
        </nav>
    </header>

    <main class="container">
        <section class="catalog-section">
            <h2>Nuestras Experiencias</h2>
            <div id="catalog-grid" class="catalog-grid">
                </div>
        </section>

        <section class="booking-section">
            <h2>Reserva tu Experiencia Sostenible</h2>
            <form id="booking-form" novalidate>
                <div class="form-group">
                    <label for="fullName">Nombre Completo:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Ej. María Pérez">
                    <span class="error-message" id="error-fullName"></span>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ej. maria@correo.com">
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="form-group">
                    <label for="experienceSelect">Experiencia a Reservar:</label>
                    <select id="experienceSelect" name="experienceSelect">
                        <option value="">-- Selecciona una experiencia --</option>
                        </select>
                    <span class="error-message" id="error-experienceSelect"></span>
                </div>

                <div class="form-group">
                    <label for="guests">Número de Personas:</label>
                    <input type="number" id="guests" name="guests" min="1" placeholder="Cantidad de cupos">
                    <span class="error-message" id="error-guests"></span>
                </div>

                <div class="form-group">
                    <label for="bookingDate">Fecha de la Actividad:</label>
                    <input type="date" id="bookingDate" name="bookingDate">
                    <span class="error-message" id="error-bookingDate"></span>
                </div>

                <button type="submit" class="btn-submit">Confirmar Reserva de Bajo Impacto</button>
            </form>
            <div id="success-alert" class="success-alert hidden"></div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Aysén Vivo. Promoviendo el turismo responsable y el emprendimiento local en la Región de Aysén.</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
